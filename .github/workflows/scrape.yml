name: Scrape and Deploy
on:
  schedule:
    - cron: '0 15 * * *'
    - cron: '0 21 * * *'
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: "${{ secrets.GITHUB_TOKEN }}"
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4 lxml selenium webdriver-manager
      - run: python scraper/fetch.py
      - name: Commit records
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add dashboard/records.json 2>/dev/null || true
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: update leads $(date -u +'%Y-%m-%d %H:%M UTC')"
          for i in 1 2 3 4 5; do
            sleep $((RANDOM % 10 + 2))
            git fetch origin main
            git rebase -X theirs origin/main || git rebase --abort
            git push origin main && echo "Push succeeded" && break
            echo "Attempt $i failed, retrying..."
          done
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/
      - uses: actions/deploy-pages@v4
